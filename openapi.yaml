openapi: 3.0.0
info:
  title: GitHub User Repos API (Minimal)
  version: 1.0.0

paths:
  /users/{username}/repos:
    get:
      summary: List repositories for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: list of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repository'

components:
  schemas:
    Repository:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        full_name:
          type: string
        private:
          type: boolean
        html_url:
          type: string
        description:
          type: string
        stargazers_count:
          type: integer
        forks_count:
          type: integer
        language:
          type: string
        owner:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        login:
          type: string
        id:
          type: integer
