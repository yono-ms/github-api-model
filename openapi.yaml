openapi: 3.0.0
info:
  title: GitHub User Repos API (Minimal)
  version: 1.0.0

paths:
  /users/{username}/repos:
    get:
      summary: List repositories for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: list of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repository'

components:
  schemas:
    Repository:
      type: object
      required:
        - id
        - name
        - full_name
        - private
        - owner
        - html_url
        - description
        - stargazers_count
        - forks_count
        - language
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        full_name:
          type: string
        private:
          type: boolean
        html_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        stargazers_count:
          type: integer
        forks_count:
          type: integer
        language:
          type: string
        owner:
          $ref: '#/components/schemas/User'
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        login:
          type: string
        id:
          type: integer
